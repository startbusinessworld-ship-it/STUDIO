<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SBW Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --black:#0C0C0A;--red:#C8192A;--red-dim:rgba(200,25,42,0.1);
  --off-white:#F0ECE4;--grey:#6B6B65;--grey-light:#1e1e1b;
  --card:#111110;--font:'Plus Jakarta Sans',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--black);color:var(--off-white);font-family:var(--font);}

/* ── TOPNAV ── */
#topnav{
  padding:12px 16px;border-bottom:1px solid var(--grey-light);
  display:flex;align-items:center;gap:10px;
  position:sticky;top:0;z-index:50;background:var(--black);
}
.nav-brand{font-size:9px;font-weight:700;letter-spacing:.25em;text-transform:uppercase;color:var(--red);}
.nav-title{font-size:15px;font-weight:700;}
.nav-right{margin-left:auto;display:flex;gap:6px;flex-wrap:wrap;}
.nbtn{
  background:none;border:1px solid var(--grey-light);color:var(--grey);
  font-family:var(--font);font-size:10px;font-weight:600;letter-spacing:.08em;
  text-transform:uppercase;padding:7px 12px;cursor:pointer;border-radius:5px;transition:all .2s;
}
.nbtn:hover{border-color:var(--red);color:var(--off-white);}
.nbtn.red{background:var(--red);border-color:var(--red);color:#fff;}
.nbtn.red:hover{opacity:.88;}

/* ── FILTER TABS ── */
#filter-tabs{
  display:flex;gap:0;border-bottom:1px solid var(--grey-light);
  overflow-x:auto;background:var(--black);position:sticky;top:53px;z-index:49;
}
#filter-tabs::-webkit-scrollbar{height:2px;}
#filter-tabs::-webkit-scrollbar-thumb{background:var(--grey-light);}
.ftab{
  background:none;border:none;border-bottom:2px solid transparent;
  color:var(--grey);font-family:var(--font);font-size:10px;font-weight:600;
  letter-spacing:.08em;text-transform:uppercase;
  padding:10px 14px;cursor:pointer;white-space:nowrap;transition:all .2s;flex-shrink:0;
}
.ftab:hover{color:var(--off-white);}
.ftab.active{color:var(--off-white);border-bottom-color:var(--red);}

/* ── SCRIPT LIST ── */
#script-list{padding:14px 16px 100px;}

.script-card{
  background:var(--card);border:1px solid var(--grey-light);
  border-left:3px solid transparent;
  border-radius:6px;margin-bottom:8px;cursor:pointer;
  transition:all .2s;overflow:hidden;
}
.script-card:hover{border-color:var(--red);transform:translateY(-1px);}
.script-card.type-short{border-left-color:var(--red);}
.script-card.type-video{border-left-color:#7ab0d4;}
.script-card.type-pub{border-left-color:#4a9a4a;}

.card-top{display:flex;align-items:center;gap:10px;padding:12px 14px;}
.card-badge{
  font-size:8px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  padding:3px 8px;border-radius:20px;flex-shrink:0;
}
.badge-short{background:var(--red-dim);color:#e07070;}
.badge-video{background:rgba(70,130,180,.1);color:#7ab0d4;}
.badge-pub{background:rgba(74,154,74,.1);color:#4a9a4a;}

.pill{
  font-size:8px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
  padding:2px 7px;border-radius:20px;flex-shrink:0;
}
.p-ie{background:rgba(200,25,42,.1);color:#e07070;}
.p-fi{background:rgba(70,130,180,.1);color:#7ab0d4;}
.p-hk{background:rgba(200,160,30,.1);color:#d4b050;}
.p-ec{background:rgba(70,180,120,.1);color:#70c490;}
.p-ms{background:rgba(180,100,200,.1);color:#c080d8;}
.p-ex{background:rgba(200,120,50,.1);color:#d49060;}
.p-im{background:rgba(100,180,200,.1);color:#70c0d4;}

.card-title{font-size:13px;font-weight:500;color:var(--off-white);flex:1;line-height:1.35;}
.card-arrow{color:var(--grey);font-size:14px;flex-shrink:0;}

/* ── EMPTY STATE ── */
.empty-state{text-align:center;padding:60px 20px;color:var(--grey);}
.empty-state .big{font-size:36px;margin-bottom:12px;}
.empty-state .title{font-size:16px;font-weight:600;color:var(--off-white);margin-bottom:6px;}
.empty-state .sub{font-size:13px;line-height:1.6;}

/* ── OVERLAY ── */
.overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);
  z-index:200;align-items:flex-end;justify-content:center;
  backdrop-filter:blur(6px);
}
.overlay.on{display:flex;}

/* ── SCRIPT DRAWER ── */
.drawer{
  background:#111110;border-top:2px solid var(--red);
  width:100%;max-width:800px;max-height:92vh;
  display:flex;flex-direction:column;border-radius:12px 12px 0 0;
  animation:slideUp .22s ease;
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}

.drawer-hdr{
  padding:14px 16px;border-bottom:1px solid var(--grey-light);
  display:flex;align-items:flex-start;gap:10px;flex-shrink:0;
}
.drawer-meta{font-size:9px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--red);margin-bottom:3px;}
.drawer-title{font-size:15px;font-weight:600;line-height:1.3;}
.drawer-actions{display:flex;gap:6px;flex-shrink:0;margin-left:auto;flex-wrap:wrap;justify-content:flex-end;}
.dact{
  border:none;font-family:var(--font);font-size:9px;font-weight:700;
  letter-spacing:.08em;text-transform:uppercase;padding:7px 12px;
  cursor:pointer;border-radius:4px;transition:all .2s;white-space:nowrap;
}
.dact-edit{background:#1a1a17;border:1px solid #2a2a27;color:var(--grey);}
.dact-edit:hover{border-color:var(--red);color:var(--off-white);}
.dact-tp{background:#1a1a17;border:1px solid #2a2a27;color:var(--off-white);}
.dact-tp:hover{border-color:var(--red);color:var(--red);}
.dact-copy{background:var(--red);color:#fff;}
.dact-copy:hover{opacity:.85;}
.dact-copy.ok{background:#2a7a2a;}
.dact-del{background:none;border:1px solid #2a2a27;color:#884444;font-size:11px;padding:7px 9px;}
.dact-del:hover{border-color:#aa4444;color:#cc6666;}
.dact-close{background:none;border:1px solid #2a2a27;color:var(--grey);width:30px;height:30px;display:flex;align-items:center;justify-content:center;font-size:13px;}
.dact-close:hover{border-color:var(--red);color:var(--red);}

.drawer-body{flex:1;overflow-y:auto;padding:18px 16px;}
.drawer-body::-webkit-scrollbar{width:3px;}
.drawer-body::-webkit-scrollbar-thumb{background:#2a2a27;}
#view-text{font-size:16px;font-weight:400;line-height:1.95;color:var(--off-white);white-space:pre-line;}
#edit-area{
  width:100%;background:#0a0a09;border:1px solid var(--red);
  color:var(--off-white);font-family:var(--font);font-size:15px;
  font-weight:400;line-height:1.9;padding:14px;outline:none;
  border-radius:6px;resize:vertical;min-height:280px;display:none;
}
.edit-footer{display:none;gap:8px;margin-top:12px;}
.btn-save{background:var(--red);border:none;color:#fff;font-family:var(--font);font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:10px 20px;cursor:pointer;border-radius:5px;}
.btn-cancel{background:#1a1a17;border:1px solid #2a2a27;color:var(--grey);font-family:var(--font);font-size:11px;font-weight:500;padding:10px 16px;cursor:pointer;border-radius:5px;}

/* ── NEW SCRIPT MODAL ── */
#new-overlay{z-index:300;align-items:center;justify-content:center;padding:16px;}
.new-box{
  background:#111110;border:1px solid #252523;border-top:2px solid var(--red);
  width:100%;max-width:500px;border-radius:8px;padding:20px;
  animation:popIn .2s ease;
}
@keyframes popIn{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:scale(1)}}
.new-title{font-size:17px;font-weight:700;margin-bottom:16px;}
.new-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--grey);margin-bottom:6px;display:block;}
.new-input{
  width:100%;background:#0a0a09;border:1px solid var(--grey-light);
  color:var(--off-white);font-family:var(--font);font-size:14px;
  padding:11px 14px;outline:none;border-radius:6px;transition:border-color .2s;margin-bottom:14px;
}
.new-input:focus{border-color:var(--red);}
.new-input::placeholder{color:#3a3a37;}
.new-select{
  width:100%;background:#0a0a09;border:1px solid var(--grey-light);
  color:var(--off-white);font-family:var(--font);font-size:14px;
  padding:11px 14px;outline:none;border-radius:6px;margin-bottom:14px;
  cursor:pointer;
}
.new-select:focus{border-color:var(--red);}
.new-actions{display:flex;gap:8px;margin-top:4px;}
.btn-create{flex:1;background:var(--red);border:none;color:#fff;font-family:var(--font);font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:12px;cursor:pointer;border-radius:6px;}
.btn-create:hover{opacity:.88;}
.btn-new-cancel{background:none;border:1px solid var(--grey-light);color:var(--grey);font-family:var(--font);font-size:12px;font-weight:500;padding:12px 16px;cursor:pointer;border-radius:6px;}

/* ── TELEPROMPTER ── */
#teleprompter{
  display:none;position:fixed;inset:0;background:#050504;z-index:500;flex-direction:column;
}
#teleprompter.on{display:flex;}
.tp-nav{
  padding:10px 16px;border-bottom:1px solid #1a1a17;
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:#080807;
}
.tp-brand{font-size:9px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--red);}
.tp-name{font-size:11px;color:var(--grey);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tp-close-btn{background:none;border:1px solid #2a2a27;color:var(--grey);font-family:var(--font);font-size:10px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;padding:6px 14px;cursor:pointer;border-radius:4px;transition:all .2s;}
.tp-close-btn:hover{border-color:var(--red);color:var(--red);}
.tp-guide{position:fixed;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(200,25,42,.2),transparent);top:30vh;pointer-events:none;z-index:5;}
.tp-scroll{flex:1;overflow-y:auto;padding:5vh 8% 40vh;}
.tp-scroll::-webkit-scrollbar{width:3px;}
.tp-scroll::-webkit-scrollbar-thumb{background:#1a1a17;}
#tp-lines{font-weight:400;color:#444441;}
.tp-line{display:block;padding:11px 0;cursor:pointer;transition:color .25s,opacity .25s;line-height:1.55;}
.tp-line.spoken{color:#252522;opacity:.35;}
.tp-line.current{color:var(--off-white);font-weight:600;opacity:1;}
.tp-line.upcoming{color:#504f4c;opacity:.6;}
.tp-line.empty{padding:4px 0;cursor:default;pointer-events:none;}
.tp-bar{
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(5,5,4,.97);border-top:1px solid #1a1a17;
  padding:10px 16px;z-index:10;backdrop-filter:blur(10px);
}
.tp-row1{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:10px;}
.tp-row2{display:flex;align-items:center;justify-content:center;gap:14px;flex-wrap:wrap;}
.tp-btn{
  border:none;font-family:var(--font);font-size:10px;font-weight:700;
  letter-spacing:.08em;text-transform:uppercase;padding:9px 16px;
  cursor:pointer;border-radius:5px;transition:all .2s;
}
.tp-btn.voice{background:var(--red);color:#fff;}
.tp-btn.voice.on{background:#8B1019;animation:pulse 1.5s infinite;}
.tp-btn.auto{background:#1a1a17;border:1px solid #2a2a27;color:var(--off-white);}
.tp-btn.auto.playing{border-color:var(--red);color:var(--red);}
.tp-btn.rst{background:#1a1a17;border:1px solid #2a2a27;color:var(--grey);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}
.tp-ctrl{display:flex;align-items:center;gap:6px;}
.tp-ctrl-lbl{font-size:9px;font-weight:600;color:var(--grey);letter-spacing:.06em;text-transform:uppercase;}
.tp-slider{-webkit-appearance:none;appearance:none;width:80px;height:3px;background:#2a2a27;outline:none;border-radius:2px;cursor:pointer;}
.tp-slider::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;background:var(--red);border-radius:50%;cursor:pointer;}
.tp-sz{background:#1a1a17;border:1px solid #2a2a27;color:var(--grey);font-family:var(--font);font-size:10px;font-weight:700;width:26px;height:26px;cursor:pointer;border-radius:4px;display:flex;align-items:center;justify-content:center;}
.tp-sz:hover{border-color:var(--red);color:var(--off-white);}
.tp-voice-ind{
  position:fixed;top:56px;left:50%;transform:translateX(-50%);
  background:rgba(200,25,42,.9);color:#fff;font-size:10px;font-weight:700;
  letter-spacing:.1em;text-transform:uppercase;padding:5px 14px;border-radius:20px;
  display:none;z-index:20;align-items:center;gap:5px;
}
.tp-voice-ind.on{display:flex;}
.tp-dot{width:6px;height:6px;background:#fff;border-radius:50%;animation:blink .8s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

/* TOAST */
.toast{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  background:#2a7a2a;color:#fff;font-size:12px;font-weight:600;
  padding:8px 18px;border-radius:20px;z-index:999;
  animation:popIn .2s ease;white-space:nowrap;
}

@media(max-width:600px){
  .drawer-actions{gap:4px;}
  .dact{padding:6px 9px;font-size:8px;}
  #tp-lines{font-size:26px!important;}
  .tp-row2{gap:8px;}
}
</style>
</head>
<body>

<!-- TOPNAV -->
<div id="topnav">
  <div>
    <div class="nav-brand">Start Business World</div>
    <div class="nav-title">SBW Studio</div>
  </div>
  <div class="nav-right">
    <button class="nbtn red" onclick="openNew()">+ Nouveau script</button>
    <button class="nbtn" onclick="downloadApp()">⬇ Télécharger</button>
    <button class="nbtn" onclick="openSettings()">⚙</button>
  </div>
</div>

<!-- FILTER TABS -->
<div id="filter-tabs">
  <button class="ftab active" onclick="setFilter('all')">Tous</button>
  <button class="ftab" onclick="setFilter('short')">Shorts</button>
  <button class="ftab" onclick="setFilter('video')">Vidéos longues</button>
  <button class="ftab" onclick="setFilter('pub')">Publications</button>
  <button class="ftab" onclick="setFilter('Import / Export')">Import/Export</button>
  <button class="ftab" onclick="setFilter('Fiscalité')">Fiscalité</button>
  <button class="ftab" onclick="setFilter('Hong Kong')">Hong Kong</button>
  <button class="ftab" onclick="setFilter('E-commerce')">E-commerce</button>
  <button class="ftab" onclick="setFilter('Mindset')">Mindset</button>
  <button class="ftab" onclick="setFilter('Expatriation')">Expatriation</button>
  <button class="ftab" onclick="setFilter('Immobilier')">Immobilier</button>
</div>

<!-- SCRIPT LIST -->
<div id="script-list"></div>

<!-- SCRIPT DRAWER -->
<div class="overlay" id="drawer-overlay" onclick="closeDrawerBg(event)">
  <div class="drawer">
    <div class="drawer-hdr">
      <div style="flex:1;min-width:0">
        <div class="drawer-meta" id="d-meta"></div>
        <div class="drawer-title" id="d-title"></div>
      </div>
      <div class="drawer-actions">
        <button class="dact dact-edit" onclick="toggleEdit()">✎</button>
        <button class="dact dact-tp" onclick="openTPFromDrawer()">📺</button>
        <button class="dact dact-copy" id="dact-copy" onclick="copyDrawer()">Copier</button>
        <button class="dact dact-del" onclick="deleteScript()">🗑</button>
        <button class="dact dact-close" onclick="closeDrawer()">✕</button>
      </div>
    </div>
    <div class="drawer-body">
      <div id="view-text"></div>
      <textarea id="edit-area" placeholder="Écris ou modifie ton script ici..."></textarea>
      <div class="edit-footer" id="edit-footer">
        <button class="btn-save" onclick="saveEdit()">✓ Sauvegarder</button>
        <button class="btn-cancel" onclick="cancelEdit()">Annuler</button>
      </div>
    </div>
  </div>
</div>

<!-- NEW SCRIPT -->
<div class="overlay" id="new-overlay" onclick="closeNewBg(event)">
  <div class="new-box">
    <div class="new-title">+ Nouveau script</div>

    <label class="new-label">Type</label>
    <select class="new-select" id="new-type">
      <option value="short">Short YouTube</option>
      <option value="video">Vidéo longue YouTube</option>
      <option value="pub">Publication</option>
    </select>

    <label class="new-label">Pilier</label>
    <select class="new-select" id="new-pillar">
      <option value="Import / Export">Import / Export</option>
      <option value="Fiscalité">Fiscalité</option>
      <option value="Hong Kong">Hong Kong</option>
      <option value="E-commerce">E-commerce</option>
      <option value="Mindset">Mindset</option>
      <option value="Expatriation">Expatriation</option>
      <option value="Immobilier">Immobilier</option>
    </select>

    <label class="new-label">Titre</label>
    <input class="new-input" id="new-title-input" placeholder="Ex : C'est quoi un Incoterm ?">

    <label class="new-label">Script (optionnel — tu peux l'écrire après)</label>
    <textarea class="new-input" id="new-text-input" style="height:100px;resize:vertical" placeholder="Écris ton script ici ou laisse vide..."></textarea>

    <div class="new-actions">
      <button class="btn-new-cancel" onclick="closeNew()">Annuler</button>
      <button class="btn-create" onclick="createScript()">Créer le script</button>
    </div>
  </div>
</div>

<!-- SETTINGS -->
<div class="overlay" id="settings-overlay" onclick="closeSettingsBg(event)">
  <div class="new-box">
    <div class="new-title">⚙ Paramètres</div>
    <label class="new-label">Clé API Anthropic (pour la génération IA)</label>
    <input class="new-input" type="password" id="api-key-input" placeholder="sk-ant-api03-...">
    <div style="font-size:11px;color:var(--grey);margin-bottom:14px;line-height:1.5;">Sauvegardée uniquement dans ton navigateur. Nécessaire pour la génération IA.</div>
    <div class="new-actions">
      <button class="btn-new-cancel" onclick="closeSettings()">Annuler</button>
      <button class="btn-create" onclick="saveSettings()">Sauvegarder</button>
    </div>
  </div>
</div>

<!-- TELEPROMPTER -->
<div id="teleprompter">
  <div class="tp-nav">
    <span class="tp-brand">SBW Studio</span>
    <span class="tp-name" id="tp-name"></span>
    <button class="tp-close-btn" onclick="closeTP()">✕ Fermer</button>
  </div>
  <div class="tp-guide"></div>
  <div class="tp-voice-ind" id="tp-voice-ind"><div class="tp-dot"></div><span>Écoute</span></div>
  <div class="tp-scroll" id="tp-scroll"><div id="tp-lines"></div></div>
  <div class="tp-bar">
    <div class="tp-row1">
      <button class="tp-btn voice" id="tp-voice-btn" onclick="toggleVoice()">🎤 Défilement vocal</button>
      <button class="tp-btn auto" id="tp-auto-btn" onclick="toggleAuto()">▶ Auto</button>
      <button class="tp-btn rst" onclick="resetTP()">↺</button>
    </div>
    <div class="tp-row2">
      <div class="tp-ctrl">
        <span class="tp-ctrl-lbl">Vitesse</span>
        <input class="tp-slider" id="tp-speed" type="range" min="1" max="10" value="3" oninput="updateSpeed()">
        <span class="tp-ctrl-lbl" id="tp-speed-val">3</span>
      </div>
      <div class="tp-ctrl">
        <span class="tp-ctrl-lbl">Taille</span>
        <button class="tp-sz" onclick="changeSize(-3)">A−</button>
        <button class="tp-sz" onclick="changeSize(3)">A+</button>
      </div>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
// SCRIPTS DATA
// ══════════════════════════════════════════════
const BASE_SCRIPTS = [
  {id:'vl1',type:'video',pillar:'Import / Export',title:'Les Incoterms de A à Z — EXW, FOB, CIF, DDP',text:`ACCROCHE — 0:00 à 0:35

Tu négocies avec un fournisseur à l'étranger.
Il te dit : "On travaille en FOB."

Et là tu dis oui parce que t'as pas envie d'avoir l'air de pas savoir.

Mais si tu signes sans comprendre l'Incoterm, tu peux perdre des milliers d'euros sans comprendre pourquoi.

CTA — 0:35 à 0:50

Tout le contenu gratuit est sur StartBusinessWorld.com — lien dans la description.

PARTIE 1 — C'est quoi un Incoterm ?

Un Incoterm définit exactement qui est responsable de quoi à chaque étape du transport.
Il en existe 11. Dans la pratique, t'en utiliseras 4.

PARTIE 2 — EXW

EXW — Ex Works. Le vendeur pose la marchandise dans son usine.
Toi tu gères tout le reste. Transport local, déclaration d'export, fret, dédouanement.
Maximum de responsabilités pour l'acheteur.

PARTIE 3 — FOB

FOB — Free On Board. Le plus utilisé depuis l'Asie.
L'exportateur livre au port et charge sur le bateau.
À partir du bateau, la responsabilité passe à toi.
Attention — l'exportateur c'est pas forcément l'usine.
L'usine fabrique. L'exportateur fait sortir légalement la marchandise du pays.

PARTIE 4 — CIF

CIF — Cost Insurance Freight.
Comme FOB mais le logisticien organise et paie le fret et l'assurance.

function getAllScripts(){
  const custom = JSON.parse(localStorage.getItem('sbw_scripts')||'[]');
  return [...BASE_SCRIPTS, ...custom];
}

function getCustomScripts(){
  return JSON.parse(localStorage.getItem('sbw_scripts')||'[]');
}

function saveCustomScript(s){
  const custom = getCustomScripts();
  const idx = custom.findIndex(c=>c.id===s.id);
  if(idx>=0) custom[idx]=s; else custom.push(s);
  localStorage.setItem('sbw_scripts', JSON.stringify(custom));
}

function deleteCustomScript(id){
  const custom = getCustomScripts().filter(c=>c.id!==id);
  localStorage.setItem('sbw_scripts', JSON.stringify(custom));
}

function isCustom(id){
  return getCustomScripts().some(c=>c.id===id);
}

  'Import / Export':'p-ie','Fiscalité':'p-fi','Hong Kong':'p-hk',

};

  short:{cls:'badge-short',label:'Short'},

};

let currentFilter = 'all';

function setFilter(f){
  currentFilter = f;
  document.querySelectorAll('.ftab').forEach(t=>t.classList.remove('active'));
  event.target.classList.add('active');
  renderList();
}

function renderList(){
  const all = getAllScripts();
  const filtered = all.filter(s=>{
    if(currentFilter==='all') return true;
    if(currentFilter==='short'||currentFilter==='video'||currentFilter==='pub') return s.type===currentFilter;
    return s.pillar===currentFilter;
  });

  const container = document.getElementById('script-list');

  if(!filtered.length){
    container.innerHTML=`<div class="empty-state">
      <div class="big">📝</div>
      <div class="title">Aucun script ici</div>
      <div class="sub">Clique sur "+ Nouveau script" pour en créer un.</div>
    </div>`;
    return;
  }

  container.innerHTML = filtered.map(s=>{
    const b = TYPE_BADGE[s.type]||TYPE_BADGE.short;
    const p = PILLAR_PILL[s.pillar]||'p-ms';
    return `<div class="script-card type-${s.type}" onclick="openDrawer('${s.id}')">
      <div class="card-top">
        <span class="card-badge ${b.cls}">${b.label}</span>
        <span class="pill ${p}">${s.pillar}</span>
        <span class="card-title">${s.title}</span>
        <span class="card-arrow">›</span>
      </div>
    </div>`;
  }).join('');
}

let currentId = null;

  const all = getAllScripts();

  document.getElementById('edit-footer').style.display = 'none';
  document.getElementById('dact-copy').textContent = 'Copier';
  document.getElementById('dact-copy').classList.remove('ok');

function toggleEdit(){
  const all = getAllScripts();

  if(!s) return;

  if(editMode){

  document.getElementById('view-text').style.display='block';
  document.getElementById('edit-area').style.display='none';
  document.getElementById('edit-footer').style.display='none';

function cancelEdit(){

  document.getElementById('view-text').style.display='block';
  document.getElementById('edit-area').style.display='none';

function copyDrawer(){
  const all = getAllScripts();

    b.textContent='✓ Copié'; b.classList.add('ok');
    setTimeout(()=>{ b.textContent='Copier'; b.classList.remove('ok'); }, 2000);

function deleteScript(){

  deleteCustomScript(currentId);

  const blob = new Blob([html], {type:'text/html;charset=utf-8'});

// TELEPROMPTER

let tpLines = [];
let tpIdx = 0;
let tpFontSize = 32;
let tpAutoOn = false;
let tpAnimFrame = null;
let tpScrollSpeed = 0.8;
let tpSpeed = 3;
let tpVoiceOn = false;
let recognition = null;

function openTPFromDrawer(){
  const all = getAllScripts();
  const s = all.find(x=>x.id===currentId);
  if(!s) return;
  openTP(s.title, s.text||'');
}

function openTP(title, text){
  document.getElementById('tp-name').textContent = title;
  buildLines(text);
  document.getElementById('tp-lines').style.fontSize = tpFontSize + 'px';
  document.getElementById('teleprompter').classList.add('on');
  document.getElementById('tp-scroll').scrollTop = 0;
  tpIdx = 0; tpAutoOn = false; tpVoiceOn = false;
  updateAutoBtn(); updateVoiceBtn();
  document.getElementById('tp-voice-ind').classList.remove('on');
}

function buildLines(text){
  const container = document.getElementById('tp-lines');
  container.innerHTML = '';
  tpLines = [];
  text.split('\n').forEach(line=>{
    const div = document.createElement('div');
    const t = line.trim();
    if(!t){
      div.className = 'tp-line empty';
      div.textContent = ' ';
      container.appendChild(div);
      tpLines.push({el:div, words:[], text:''});
      return;
    }
    div.className = 'tp-line upcoming';
    div.textContent = t;
    container.appendChild(div);
    const words = t.toLowerCase().replace(/[^a-z0-9\u00e0-\u00ff\s]/g,'').split(/\s+/).filter(w=>w.length>1);
    tpLines.push({el:div, words, text:t});
  });
  tpLines.forEach((l,i)=>{
    if(!l.el.classList.contains('empty'))
      l.el.onclick = ()=>jumpTo(i);
  });
  highlightLine(0);
}

function highlightLine(idx){
  tpIdx = idx;
  tpLines.forEach((l,i)=>{
    l.el.classList.remove('spoken','current','upcoming');
    if(i<idx) l.el.classList.add('spoken');
    else if(i===idx) l.el.classList.add('current');
    else l.el.classList.add('upcoming');
  });
}

function scrollToLine(){
  if(!tpLines[tpIdx]) return;
  const el = tpLines[tpIdx].el;
  const scroll = document.getElementById('tp-scroll');
  scroll.scrollTo({top:Math.max(0, el.offsetTop-(window.innerHeight*.28)), behavior:'smooth'});
}

function updateByPos(){
  const guideY = window.innerHeight * .30;
  let best = tpIdx, bestDist = Infinity;
  tpLines.forEach((l,i)=>{
    const r = l.el.getBoundingClientRect();
    if(!r.height) return;
    const d = Math.abs(r.top + r.height/2 - guideY);
    if(d<bestDist){ bestDist=d; best=i; }
  });
  if(best!==tpIdx) highlightLine(best);
}

function jumpTo(idx){
  stopAuto(); stopVoice();
  highlightLine(idx); scrollToLine();
}

function toggleAuto(){
  if(tpAutoOn) stopAuto(); else startAuto();
  updateAutoBtn();
}

function startAuto(){
  stopAuto(); tpAutoOn = true;
  const scroll = document.getElementById('tp-scroll');
  function step(){
    scroll.scrollTop += tpScrollSpeed;
    updateByPos();
    if(scroll.scrollTop < scroll.scrollHeight - scroll.clientHeight - 2){
      tpAnimFrame = requestAnimationFrame(step);
    } else {
      tpAutoOn = false; updateAutoBtn();
    }
  }
  tpAnimFrame = requestAnimationFrame(step);
}

function stopAuto(){
  if(tpAnimFrame){ cancelAnimationFrame(tpAnimFrame); tpAnimFrame=null; }
  tpAutoOn = false;
}

function updateAutoBtn(){
  const b = document.getElementById('tp-auto-btn');
  b.textContent = tpAutoOn ? '⏸ Pause' : '▶ Auto';
  b.classList.toggle('playing', tpAutoOn);
}

function updateSpeed(){
  tpSpeed = parseInt(document.getElementById('tp-speed').value);
  document.getElementById('tp-speed-val').textContent = tpSpeed;
  tpScrollSpeed = 0.3 + (tpSpeed-1) * (4-0.3)/9;
  if(tpAutoOn){ stopAuto(); startAuto(); }
}

function toggleVoice(){ if(tpVoiceOn) stopVoice(); else startVoice(); }

function startVoice(){
  const SR = window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){ alert('La reconnaissance vocale nécessite Chrome ou Safari.'); return; }
  stopAuto();
  recognition = new SR();
  recognition.lang = 'fr-FR';
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.maxAlternatives = 2;
  recognition.onstart = ()=>{
    tpVoiceOn = true; updateVoiceBtn();
    document.getElementById('tp-voice-ind').classList.add('on');
  };
  recognition.onresult = function(event){
    for(var i=event.resultIndex;i<event.results.length;i++){
      var transcript = event.results[i][0].transcript.toLowerCase()
        .replace(/[^a-z0-9\u00e0-\u00ff\s]/g,'').trim();
      var spoken = transcript.split(/\s+/).filter(function(w){return w.length>2;});
      if(!spoken.length) continue;
      var searchEnd = Math.min(tpIdx+10, tpLines.length);
      var bestMatch = -1, bestScore = 0;
      for(var j=tpIdx;j<searchEnd;j++){
        var lws = tpLines[j].words||[];
        if(!lws.length) continue;
        var score = 0;
        for(var s=0;s<spoken.length;s++){
          var sw = spoken[s];
          for(var l=0;l<lws.length;l++){
            var lw = lws[l];
            if(lw===sw||(sw.length>=4&&lw.indexOf(sw.slice(0,4))===0)||(lw.length>=4&&sw.indexOf(lw.slice(0,4))===0)){
              score++;break;
            }
          }
        }
        if(score>bestScore){bestScore=score;bestMatch=j;}
      }
      if(bestMatch>tpIdx&&bestScore>=1){
        highlightLine(bestMatch); scrollToLine();
      }
    }
  };
  recognition.onerror = function(e){ if(e.error!=='no-speech'&&e.error!=='aborted') stopVoice(); };
  recognition.onend = function(){ if(tpVoiceOn){ try{recognition.start();}catch(e){} } };
  try{ recognition.start(); }catch(e){ tpVoiceOn=false; updateVoiceBtn(); }
}

function stopVoice(){
  tpVoiceOn = false;
  if(recognition){ try{recognition.stop();}catch(e){} recognition=null; }
  updateVoiceBtn();
  document.getElementById('tp-voice-ind').classList.remove('on');
}

function updateVoiceBtn(){
  const b = document.getElementById('tp-voice-btn');
  b.textContent = tpVoiceOn ? '🎤 Arrêter' : '🎤 Défilement vocal';
  b.classList.toggle('on', tpVoiceOn);
}

function resetTP(){
  stopAuto(); stopVoice();
  highlightLine(0);
  document.getElementById('tp-scroll').scrollTop = 0;
}

function closeTP(){
  stopAuto(); stopVoice();
  document.getElementById('teleprompter').classList.remove('on');
}

function changeSize(d){
  tpFontSize = Math.max(18, Math.min(72, tpFontSize+d));
  document.getElementById('tp-lines').style.fontSize = tpFontSize + 'px';
}

// ══════════════════════════════════════════════
// KEYBOARD
// ══════════════════════════════════════════════
document.addEventListener('keydown', e=>{
  if(document.getElementById('teleprompter').classList.contains('on')){
    if(e.code==='Space'){e.preventDefault();toggleAuto();}
    if(e.key==='ArrowDown'||e.key==='ArrowRight'){e.preventDefault();if(tpIdx<tpLines.length-1){highlightLine(tpIdx+1);scrollToLine();}}
    if(e.key==='ArrowUp'||e.key==='ArrowLeft'){e.preventDefault();if(tpIdx>0){highlightLine(tpIdx-1);scrollToLine();}}
    if(e.key==='Escape') closeTP();
  } else {
    if(e.key==='Escape'){
      closeDrawer();
      closeNew();
      closeSettings();
    }
  }
});

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
renderList();
</script>
