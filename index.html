<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SBW Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --black: #0C0C0A;
  --red: #C8192A;
  --red-dim: rgba(200,25,42,0.1);
  --off-white: #F0ECE4;
  --grey: #6B6B65;
  --grey-mid: #3a3a37;
  --grey-light: #1e1e1b;
  --card: #111110;
  --font: 'Plus Jakarta Sans', sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--black);color:var(--off-white);font-family:var(--font);overflow-x:hidden;}

/* ══════════ LOGIN ══════════ */
#login-screen{
  position:fixed;inset:0;background:var(--black);
  display:flex;align-items:center;justify-content:center;z-index:1000;
}
.login-box{width:100%;max-width:380px;padding:32px 24px;}
.login-logo{font-size:10px;font-weight:600;letter-spacing:.28em;text-transform:uppercase;color:var(--red);margin-bottom:10px;}
.login-title{font-size:32px;font-weight:700;color:var(--off-white);margin-bottom:4px;line-height:1.1;}
.login-sub{font-size:13px;color:var(--grey);font-weight:400;margin-bottom:32px;}
.login-label{font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--grey);margin-bottom:8px;display:block;}
.login-input{
  width:100%;background:#111110;border:1px solid var(--grey-light);
  color:var(--off-white);font-family:var(--font);font-size:15px;font-weight:400;
  padding:13px 16px;outline:none;border-radius:6px;transition:border-color .2s;
}
.login-input:focus{border-color:var(--red);}
.login-input::placeholder{color:#3a3a37;}
.login-btn{
  width:100%;margin-top:12px;background:var(--red);border:none;
  color:#fff;font-family:var(--font);font-size:13px;font-weight:600;
  letter-spacing:.1em;text-transform:uppercase;padding:14px;
  cursor:pointer;border-radius:6px;transition:opacity .2s;
}
.login-btn:hover{opacity:.88;}
.login-error{font-size:12px;color:var(--red);margin-top:10px;display:none;}

/* ══════════ APP ══════════ */
#app{display:none;min-height:100vh;flex-direction:column;}
#app.visible{display:flex;}

/* ── TOP NAV ── */
#topnav{
  padding:12px 20px;border-bottom:1px solid var(--grey-light);
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;background:var(--black);flex-shrink:0;
}
.nav-brand{font-size:10px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--red);}
.nav-title{font-size:15px;font-weight:600;color:var(--off-white);}
.nav-logout{
  background:none;border:1px solid var(--grey-light);color:var(--grey);
  font-family:var(--font);font-size:10px;font-weight:500;letter-spacing:.1em;
  text-transform:uppercase;padding:6px 12px;cursor:pointer;border-radius:4px;transition:all .2s;
}
.nav-logout:hover{border-color:var(--red);color:var(--off-white);}

/* ── MONTH NAV ── */
#month-nav{
  padding:12px 20px;display:flex;align-items:center;
  justify-content:space-between;border-bottom:1px solid var(--grey-light);
  background:var(--card);
}
.month-btn{
  background:none;border:1px solid var(--grey-light);color:var(--grey);
  font-size:16px;width:32px;height:32px;cursor:pointer;border-radius:4px;
  display:flex;align-items:center;justify-content:center;transition:all .2s;
}
.month-btn:hover{border-color:var(--red);color:var(--off-white);}
.month-label{font-size:17px;font-weight:600;}
.month-stats{display:flex;gap:14px;}
.mstat{text-align:center;}
.mstat-val{font-size:18px;font-weight:700;color:var(--red);}
.mstat-lbl{font-size:9px;font-weight:500;color:var(--grey);letter-spacing:.08em;text-transform:uppercase;}

/* ── WEEK TABS ── */
#week-tabs{
  display:flex;border-bottom:1px solid var(--grey-light);
  overflow-x:auto;background:var(--black);
}
#week-tabs::-webkit-scrollbar{height:2px;}
#week-tabs::-webkit-scrollbar-thumb{background:var(--grey-light);}
.wtab{
  background:none;border:none;border-bottom:2px solid transparent;
  color:var(--grey);font-family:var(--font);font-size:11px;font-weight:600;
  letter-spacing:.08em;text-transform:uppercase;
  padding:12px 18px;cursor:pointer;white-space:nowrap;transition:all .2s;flex-shrink:0;
}
.wtab:hover{color:var(--off-white);}
.wtab.active{color:var(--off-white);border-bottom-color:var(--red);}

/* ── WEEK CONTENT ── */
#week-content{flex:1;overflow-y:auto;padding:18px 20px 80px;}
#week-content::-webkit-scrollbar{width:4px;}
#week-content::-webkit-scrollbar-thumb{background:var(--grey-light);}

/* ── VIDEO BANNER ── */
.vbanner{
  background:linear-gradient(135deg,#1a0508,#110d0d);
  border:1px solid rgba(200,25,42,0.2);border-left:3px solid var(--red);
  padding:13px 16px;margin-bottom:16px;
  display:flex;align-items:center;justify-content:space-between;
  cursor:pointer;transition:opacity .2s;border-radius:6px;
}
.vbanner:hover{opacity:.85;}
.vb-left{display:flex;align-items:center;gap:10px;}
.vb-icon{font-size:16px;}
.vb-type{font-size:9px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--red);margin-bottom:2px;}
.vb-title{font-size:13px;font-weight:500;}
.vb-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.vb-dur{font-size:10px;color:var(--grey);}
.open-btn{
  background:var(--red);border:none;color:#fff;font-family:var(--font);
  font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
  padding:6px 12px;cursor:pointer;border-radius:4px;white-space:nowrap;
}

/* ── DAY BLOCK ── */
.day-block{margin-bottom:22px;}
.day-hdr{
  display:flex;align-items:center;padding-bottom:10px;margin-bottom:10px;
  border-bottom:1px solid var(--grey-light);
}
.day-name{font-size:16px;font-weight:700;}
.day-count{margin-left:auto;font-size:10px;font-weight:500;color:var(--grey);}

/* ── CARDS ── */
.shorts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:7px;margin-bottom:7px;}
.pubs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:7px;}
.ccard{
  background:var(--card);border:1px solid var(--grey-light);border-top:2px solid transparent;
  padding:11px 12px;cursor:pointer;transition:all .2s;border-radius:6px;
}
.ccard:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.5);}
.ccard.short{border-top-color:rgba(200,25,42,.35);}
.ccard.short:hover{border-top-color:var(--red);}
.ccard.pub{border-top-color:rgba(74,154,74,.35);}
.ccard.pub:hover{border-top-color:#4a9a4a;}
.cc-type{font-size:8px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;margin-bottom:5px;}
.cc-type.s{color:var(--red);}
.cc-type.p{color:#4a9a4a;}
.pill{display:inline-block;font-size:8px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:2px 7px;border-radius:20px;margin-bottom:5px;}
.p-ie{background:rgba(200,25,42,.1);color:#e07070;}
.p-fi{background:rgba(70,130,180,.1);color:#7ab0d4;}
.p-hk{background:rgba(200,160,30,.1);color:#d4b050;}
.p-ec{background:rgba(70,180,120,.1);color:#70c490;}
.p-ms{background:rgba(180,100,200,.1);color:#c080d8;}
.p-ex{background:rgba(200,120,50,.1);color:#d49060;}
.p-im{background:rgba(100,180,200,.1);color:#70c0d4;}
.cc-title{font-size:12px;font-weight:400;color:var(--off-white);line-height:1.45;}
.cc-fmt{font-size:9px;color:var(--grey);margin-top:4px;}

/* ══════════ OVERLAY ══════════ */
#overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:500;
  align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(6px);
}
#overlay.on{display:flex;}
.popup{
  background:#111110;border:1px solid #252523;border-top:2px solid var(--red);
  width:100%;max-width:700px;max-height:92vh;display:flex;flex-direction:column;
  border-radius:8px;animation:popIn .2s ease;
}
@keyframes popIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.popup-hdr{
  padding:14px 16px;border-bottom:1px solid var(--grey-light);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:10px;
}
.ph-meta{font-size:9px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--red);margin-bottom:2px;}
.ph-title{font-size:15px;font-weight:600;}
.ph-actions{display:flex;gap:6px;flex-shrink:0;}
.btn-tp{
  background:#1a1a17;border:1px solid #2a2a27;color:var(--off-white);
  font-family:var(--font);font-size:10px;font-weight:500;letter-spacing:.08em;
  text-transform:uppercase;padding:7px 12px;cursor:pointer;border-radius:4px;
  transition:all .2s;white-space:nowrap;
}
.btn-tp:hover{border-color:var(--red);color:var(--red);}
.btn-cp{
  background:var(--red);border:none;color:#fff;font-family:var(--font);
  font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
  padding:7px 14px;cursor:pointer;border-radius:4px;transition:opacity .2s;white-space:nowrap;
}
.btn-cp:hover{opacity:.85;}
.btn-cp.ok{background:#2a7a2a;}
.btn-cl{
  background:none;border:1px solid #2a2a27;color:var(--grey);
  width:30px;height:30px;cursor:pointer;border-radius:4px;
  display:flex;align-items:center;justify-content:center;font-size:13px;
  transition:all .2s;flex-shrink:0;
}
.btn-cl:hover{border-color:var(--red);color:var(--red);}
.popup-body{flex:1;overflow-y:auto;padding:22px 18px;}
.popup-body::-webkit-scrollbar{width:3px;}
.popup-body::-webkit-scrollbar-thumb{background:#2a2a27;}
.script-render{
  font-size:16px;font-weight:400;line-height:1.95;
  color:var(--off-white);white-space:pre-line;
}

/* ══════════ TELEPROMPTER ══════════ */
#teleprompter{
  display:none;position:fixed;inset:0;background:#050504;z-index:600;flex-direction:column;
}
#teleprompter.on{display:flex;}

.tp-nav{
  padding:10px 16px;border-bottom:1px solid #1a1a17;
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
  background:#080807;
}
.tp-brand{font-size:10px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--red);}
.tp-lesson-name{font-size:11px;font-weight:400;color:var(--grey);max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tp-close-btn{
  background:none;border:1px solid #2a2a27;color:var(--grey);
  font-family:var(--font);font-size:10px;font-weight:500;letter-spacing:.08em;
  text-transform:uppercase;padding:6px 14px;cursor:pointer;border-radius:4px;transition:all .2s;
}
.tp-close-btn:hover{border-color:var(--red);color:var(--red);}

/* Reading guide line */
.tp-guide{
  position:fixed;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,rgba(200,25,42,0.25),transparent);
  top:30vh;pointer-events:none;z-index:5;
}

.tp-scroll{flex:1;overflow-y:auto;padding:5vh 8% 40vh;position:relative;}
.tp-scroll::-webkit-scrollbar{width:3px;}
.tp-scroll::-webkit-scrollbar-thumb{background:#1a1a17;}

#tp-words{font-size:36px;font-weight:400;line-height:2.2;color:#444441;letter-spacing:.01em;}

/* Word highlighting */
.tp-word{
  display:inline;transition:color .15s;cursor:pointer;
}
.tp-word.spoken{color:#5a5a55;}
.tp-word.current{color:var(--off-white);font-weight:500;}
.tp-word.upcoming{color:#888882;}

/* ── TP BOTTOM BAR ── */
.tp-bar{
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(5,5,4,0.97);border-top:1px solid #1a1a17;
  padding:10px 16px;z-index:10;backdrop-filter:blur(10px);
}
.tp-bar-row1{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:10px;}
.tp-bar-row2{display:flex;align-items:center;justify-content:center;gap:16px;flex-wrap:wrap;}

.tp-big-btn{
  border:none;font-family:var(--font);font-size:11px;font-weight:600;
  letter-spacing:.1em;text-transform:uppercase;
  padding:10px 20px;cursor:pointer;border-radius:5px;transition:all .2s;
  display:flex;align-items:center;gap:6px;
}
.tp-big-btn.voice{background:var(--red);color:#fff;}
.tp-big-btn.voice.listening{background:#8B1019;animation:pulse 1.5s infinite;}
.tp-big-btn.scroll{background:#1a1a17;border:1px solid #2a2a27;color:var(--off-white);}
.tp-big-btn.scroll.playing{border-color:var(--red);color:var(--red);}
.tp-big-btn.reset{background:#1a1a17;border:1px solid #2a2a27;color:var(--grey);}
.tp-big-btn.reset:hover{color:var(--off-white);}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}

.tp-ctrl-group{display:flex;align-items:center;gap:8px;}
.tp-ctrl-label{font-size:10px;font-weight:500;color:var(--grey);letter-spacing:.06em;text-transform:uppercase;}
.tp-slider{
  -webkit-appearance:none;appearance:none;
  width:90px;height:3px;background:#2a2a27;outline:none;border-radius:2px;cursor:pointer;
}
.tp-slider::-webkit-slider-thumb{
  -webkit-appearance:none;width:14px;height:14px;background:var(--red);
  border-radius:50%;cursor:pointer;
}
.tp-size-btn{
  background:#1a1a17;border:1px solid #2a2a27;color:var(--grey);
  font-family:var(--font);font-size:11px;font-weight:600;
  width:28px;height:28px;cursor:pointer;border-radius:4px;
  display:flex;align-items:center;justify-content:center;transition:all .2s;
}
.tp-size-btn:hover{border-color:var(--red);color:var(--off-white);}

/* Voice status indicator */
.tp-voice-status{
  position:fixed;top:56px;left:50%;transform:translateX(-50%);
  background:rgba(200,25,42,0.9);color:#fff;
  font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
  padding:6px 16px;border-radius:20px;
  display:none;z-index:20;align-items:center;gap:6px;
}
.tp-voice-status.on{display:flex;}
.tp-dot{width:7px;height:7px;background:#fff;border-radius:50%;animation:blink .8s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

/* ══════════ MOBILE ══════════ */
@media(max-width:600px){
  #topnav,#month-nav,#week-content{padding-left:14px;padding-right:14px;}
  .shorts-grid{grid-template-columns:1fr 1fr;}
  .popup-hdr{flex-wrap:wrap;}
  .ph-actions{flex-wrap:wrap;}
  #tp-words{font-size:28px;}
  .tp-bar-row2{gap:10px;}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">Start Business World</div>
    <div class="login-title">SBW Studio</div>
    <div class="login-sub">Planning · Scripts · Téléprompter</div>
    <label class="login-label" style="margin-top:24px">Mot de passe</label>
    <input class="login-input" type="password" id="pw-input" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">Accéder →</button>
    <div class="login-error" id="login-error">Mot de passe incorrect.</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div id="topnav">
    <div>
      <div class="nav-brand">Start Business World</div>
      <div class="nav-title">SBW Studio</div>
    </div>
    <button class="nav-logout" onclick="doLogout()">Déconnexion</button>
  </div>
  <div id="month-nav">
    <button class="month-btn" onclick="changeMonth(-1)">‹</button>
    <div class="month-label" id="month-label"></div>
    <div class="month-stats">
      <div class="mstat"><div class="mstat-val">140</div><div class="mstat-lbl">Shorts</div></div>
      <div class="mstat"><div class="mstat-val">56</div><div class="mstat-lbl">Pubs</div></div>
      <div class="mstat"><div class="mstat-val">8</div><div class="mstat-lbl">Vidéos</div></div>
    </div>
    <button class="month-btn" onclick="changeMonth(1)">›</button>
  </div>
  <div id="week-tabs">
    <button class="wtab active" onclick="showWeek(0)">Semaine 1</button>
    <button class="wtab" onclick="showWeek(1)">Semaine 2</button>
    <button class="wtab" onclick="showWeek(2)">Semaine 3</button>
    <button class="wtab" onclick="showWeek(3)">Semaine 4</button>
  </div>
  <div id="week-content"></div>
</div>

<!-- SCRIPT OVERLAY -->
<div id="overlay" onclick="closeOverlayBg(event)">
  <div class="popup" id="popup">
    <div class="popup-hdr">
      <div style="flex:1;min-width:0">
        <div class="ph-meta" id="ph-meta"></div>
        <div class="ph-title" id="ph-title"></div>
      </div>
      <div class="ph-actions">
        <button class="btn-tp" onclick="openTP()">📺 Téléprompter</button>
        <button class="btn-cp" id="btn-cp" onclick="copyScript()">Copier</button>
        <button class="btn-cl" onclick="closeOverlay()">✕</button>
      </div>
    </div>
    <div class="popup-body"><div class="script-render" id="script-render"></div></div>
  </div>
</div>

<!-- TELEPROMPTER -->
<div id="teleprompter">
  <div class="tp-nav">
    <span class="tp-brand">SBW Studio</span>
    <span class="tp-lesson-name" id="tp-lesson-name"></span>
    <button class="tp-close-btn" onclick="closeTP()">✕ Fermer</button>
  </div>

  <div class="tp-guide"></div>

  <div class="tp-voice-status" id="tp-voice-status">
    <div class="tp-dot"></div>
    <span>Écoute en cours</span>
  </div>

  <div class="tp-scroll" id="tp-scroll">
    <div id="tp-words"></div>
  </div>

  <div class="tp-bar">
    <div class="tp-bar-row1">
      <button class="tp-big-btn voice" id="tp-voice-btn" onclick="toggleVoice()">🎤 Défilement vocal</button>
      <button class="tp-big-btn scroll" id="tp-scroll-btn" onclick="toggleAutoScroll()">▶ Défilement auto</button>
      <button class="tp-big-btn reset" onclick="resetTP()">↺ Début</button>
    </div>
    <div class="tp-bar-row2">
      <div class="tp-ctrl-group">
        <span class="tp-ctrl-label">Vitesse</span>
        <input class="tp-slider" id="tp-speed" type="range" min="1" max="10" value="3" oninput="updateSpeed()">
        <span class="tp-ctrl-label" id="tp-speed-val">3</span>
      </div>
      <div class="tp-ctrl-group">
        <span class="tp-ctrl-label">Taille</span>
        <button class="tp-size-btn" onclick="changeSize(-3)">A−</button>
        <button class="tp-size-btn" onclick="changeSize(3)">A+</button>
      </div>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
// AUTH
// ══════════════════════════════════════════════
const PASSWORD = 'sbw2025';
function doLogin(){
  const v = document.getElementById('pw-input').value;
  if(v===PASSWORD){
    localStorage.setItem('sbw_auth','1');
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').classList.add('visible');
    initApp();
  } else {
    document.getElementById('login-error').style.display='block';
    document.getElementById('pw-input').value='';
  }
}
function doLogout(){ localStorage.removeItem('sbw_auth'); location.reload(); }
if(localStorage.getItem('sbw_auth')==='1'){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').classList.add('visible');
}

// ══════════════════════════════════════════════
// SCRIPTS DATA
// ══════════════════════════════════════════════
const SCRIPTS = {
vl1:{meta:"🎥 Vidéo Longue · S1V1 · ~12 min",title:"Les Incoterms de A à Z — EXW, FOB, CIF, DDP",text:`ACCROCHE — 0:00 à 0:35

Tu négocies avec un fournisseur à l'étranger.
Il te dit : "On travaille en FOB."
Ou en EXW. Ou en CIF.

Et là tu dis oui parce que t'as pas envie d'avoir l'air de pas savoir.

Mais si tu signes sans comprendre l'Incoterm, tu peux perdre des milliers d'euros sans comprendre pourquoi.

Dans cette vidéo je t'explique les 4 Incoterms essentiels.
Ce qu'ils veulent dire, qui paie quoi, et lequel choisir.

CTA — 0:35 à 0:50

Avant de commencer — tout le contenu gratuit sur l'entrepreneuriat, l'import-export et la fiscalité est sur StartBusinessWorld.com.
T'as le lien dans la description.

PARTIE 1 — C'est quoi un Incoterm ? — 0:50 à 2:30

Un Incoterm, c'est un terme commercial standardisé créé par la Chambre de Commerce Internationale.

Son rôle : définir exactement qui est responsable de quoi à chaque étape du transport.

Qui organise le transport local ?
Qui paie le fret maritime ?
Qui fait la déclaration d'export ?
Qui fait la déclaration d'import ?
Qui paie les droits de douane ?

Sans Incoterm, tout ça doit être négocié au cas par cas.
Avec un Incoterm, tout est clair en 3 lettres.

Il en existe 11.
Mais dans la pratique de l'import, t'en utiliseras 4.

PARTIE 2 — EXW — 2:30 à 4:30

EXW — Ex Works.

Le vendeur pose la marchandise dans son usine ou son entrepôt.
C'est tout.

Toi tu gères tout le reste.
Transport local. Déclaration d'export. Fret international. Assurance. Dédouanement. Livraison finale.

EXW c'est le maximum de responsabilités pour l'acheteur.

Utile uniquement si t'as un agent local dans le pays du fournisseur.
Sinon, évite.

PARTIE 3 — FOB — 4:30 à 6:30

FOB — Free On Board.

C'est le plus utilisé dans l'import depuis la Chine et les autres pays d'Asie.

L'exportateur livre la marchandise jusqu'au port de départ et la charge sur le bateau.

Attention — l'exportateur c'est pas forcément l'usine.
L'usine elle fabrique, point.
L'exportateur c'est celui qui prend la responsabilité légale de faire sortir la marchandise du pays.

À partir du moment où la marchandise est sur le bateau, la responsabilité passe à toi.

Tu payes le fret maritime.
Tu gères le dédouanement à l'arrivée.

FOB c'est l'Incoterm idéal quand tu débutes.
Tu gardes le contrôle sur le fret international.
Tu connais chaque coût.

PARTIE 4 — CIF — 6:30 à 8:30

CIF — Cost Insurance Freight.

Comme FOB, mais le logisticien organise et paie le fret maritime et l'assurance jusqu'au port de destination.

Le risque : le logisticien choisit le transporteur.
Il peut se faire une marge dessus.
Tu vois un prix global, tu ne peux pas comparer.

CIF peut être intéressant pour une première commande test.
À terme, reprends le contrôle avec le FOB.

PARTIE 5 — DDP — 8:30 à 10:00

DDP — Delivered Duty Paid.

Le logisticien gère absolument tout.
Transport local, déclaration d'export, fret international, assurance, dédouanement, droits de douane, livraison finale.

Tu ne fais rien.

En théorie c'est le plus simple.
En pratique c'est le plus cher — zéro contrôle.
Le logisticien avance les droits et les répercute dans sa facturation.

DDP c'est bien pour valider un produit sur une petite commande.
Pas pour une activité sérieuse.

CONCLUSION — 10:00 à 11:00

La règle simple.

Quand tu débutes — négocie en FOB.
Tu contrôles le fret. Tu connais tes coûts. Tu travailles avec ton propre transitaire.

Abonne-toi. Tout le contenu gratuit sur StartBusinessWorld.com.
À tout de suite.`},

vl2:{meta:"🎥 Vidéo Longue · S1V2 · ~10 min",title:"Transport maritime en import-export — tout ce qu'il faut savoir",text:`ACCROCHE — 0:00 à 0:30

90% des marchandises mondiales voyagent par bateau.

Si tu fais de l'import-export, tu vas forcément passer par le maritime.

Dans cette vidéo je t'explique comment ça fonctionne — les types de containers, les délais, les coûts, les documents clés.

CTA — 0:30 à 0:45

Tout le contenu gratuit sur l'import-export et l'entrepreneuriat est sur StartBusinessWorld.com.
Lien dans la description.

PARTIE 1 — Pourquoi le maritime — 0:45 à 2:00

Le transport maritime c'est le choix par défaut quand tu importes en volume.

Parce que c'est de loin le moins cher pour les grandes quantités.

Un container de 20 pieds peut transporter jusqu'à 28 tonnes.
Un container de 40 pieds, c'est le double.

Le coût au kilo est imbattable comparé à l'aérien.

L'inconvénient : le temps.
Depuis la Chine, compte 25 à 40 jours selon le port de destination.
Depuis l'Inde, 20 à 30 jours.
Depuis la Turquie, 10 à 15 jours.

PARTIE 2 — FCL vs LCL — 2:00 à 4:00

Deux options en maritime.

FCL — Full Container Load.
Tu remplis un container entier rien que pour toi.
Plus économique au mètre cube à partir d'environ 15 CBM.

LCL — Less than Container Load.
Tu partages le container avec d'autres importateurs.
Tu payes uniquement pour le volume que tu occupes.
Idéal pour débuter ou pour des commandes moyennes.

Attention en LCL — des frais de groupage et dégroupage s'ajoutent.
Ton transitaire te les détaille dans son devis.

PARTIE 3 — Les documents essentiels — 4:00 à 6:30

Le Bill of Lading.
C'est le titre de propriété de ta marchandise en transit.
Celui qui le détient est le propriétaire légal du produit.
Sans lui tu ne peux pas récupérer ta marchandise au port.

La facture commerciale.
Vendeur, acheteur, description des produits, quantités, prix, Incoterm.

La packing list.
Contenu détaillé de chaque colis. Poids brut, poids net, dimensions.

Le certificat d'origine dans certains cas.
Prouve où le produit a été fabriqué.
Utile pour bénéficier d'accords commerciaux.

PARTIE 4 — Suivi et imprévus — 6:30 à 8:30

Une fois ton container sur le bateau, tu le suis via le numéro de Bill of Lading.

Mais le maritime a ses imprévus.
Congestion portuaire. Météo. Grèves.

C'est pour ça que tu dois prévoir des stocks tampons.
Si tu comptes sur la livraison pile au bon moment, tu vas avoir des ruptures.

CONCLUSION — 8:30 à 9:30

Le maritime c'est le fondement de l'import-export.

Dans la prochaine vidéo : le dédouanement.

Abonne-toi. Tout le contenu gratuit sur StartBusinessWorld.com.`},

s5_1:{meta:"Short · Vendredi S1 · Import/Export",title:"Le transitaire — l'acteur le plus important de ton import",text:`Dans une opération d'import, il y a un acteur que beaucoup de débutants sous-estiment.

Le transitaire.

C'est lui qui fait voyager ta marchandise de l'usine jusqu'à ton entrepôt.

Concrètement, il s'occupe de quoi ?

Il réserve l'espace dans les containers.
Il coordonne le transporteur local chez le fournisseur.
Il gère tous les documents de transport.
Il fait la déclaration en douane à l'import.
Et quand il y a un problème, c'est lui qui gère.

Choisir un mauvais transitaire, ça peut te coûter très cher.

Des marchandises bloquées au port avec des frais de stockage qui s'accumulent.
Des erreurs de dédouanement qui déclenchent des contrôles.

Critères pour choisir le bon.
Réactivité. Transparence sur les coûts. Expérience sur ta route d'import.

Je t'explique comment le choisir sur StartBusinessWorld.com — lien dans la description.`},
s5_2:{meta:"Short · Vendredi S1 · Fiscalité",title:"L'optimisation fiscale c'est légal — arrête d'avoir peur",text:`Optimisation fiscale.

Beaucoup de gens entendent ce mot et pensent à quelque chose d'illégal.

C'est faux.

L'optimisation fiscale c'est utiliser les outils légaux mis à disposition par la loi pour réduire ton imposition.

La fraude fiscale c'est cacher des revenus, falsifier des documents, mentir à l'administration.

L'optimisation fiscale c'est choisir la bonne structure juridique.
C'est se rémunérer de la façon la plus efficace.
C'est déduire légalement tes charges.

En France, la loi elle-même prévoit ces mécanismes.
Les utiliser c'est pas tricher. C'est être bien conseillé.

Arrête de payer plus que ce que tu dois.

Je t'explique comment optimiser ta fiscalité sur StartBusinessWorld.com — lien dans la description.`},
s5_3:{meta:"Short · Vendredi S1 · Expatriation",title:"Résidence fiscale — à partir de quand tu n'es plus imposable en France",text:`Tu quittes la France. À partir de quand tu n'es plus imposable là-bas ?

Tu es considéré résident fiscal français si l'une de ces conditions est remplie.

Condition 1 — Ton foyer est en France.
Ta famille, ton domicile principal.

Condition 2 — Ton lieu de séjour principal est en France.
Tu passes plus de 183 jours par an sur le territoire.

Condition 3 — Ton activité professionnelle principale est exercée en France.

Condition 4 — Le centre de tes intérêts économiques est en France.

Il suffit d'une seule condition pour que tu sois encore résident fiscal français.

Pour couper ta résidence fiscale française, tu dois t'assurer qu'aucune de ces conditions n'est remplie.

C'est pas aussi simple que de prendre un appartement à Dubaï.
Ça se prépare sérieusement.

Je t'explique tout sur StartBusinessWorld.com — lien dans la description.`},
s5_4:{meta:"Short · Vendredi S1 · E-commerce",title:"Stock ou dropshipping — lequel choisir quand tu démarres",text:`Stock ou dropshipping — laquelle choisir quand tu démarres ?

Le dropshipping : tu vends sans stocker.
Zéro investissement en stock.

Avantages.
Pas de capital immobilisé.
Tu peux tester beaucoup de produits rapidement.

Inconvénients.
Marges très faibles.
Tu contrôles pas la qualité d'expédition.
Délais souvent longs.
Concurrence massive.

Le stock.
Tu importes. Tu stockes. Tu expédies.
Marges meilleures. Contrôle total.
Mais tu immobilises du capital.

Ma recommandation.

Commence en dropshipping pour valider un produit.
Dès que tu vois que ça vend, passe au stock importé.
Tu multiplies ta marge par 2 ou 3.

Tout sur StartBusinessWorld.com — lien dans la description.`},
s5_5:{meta:"Short · Vendredi S1 · Mindset",title:"La patience c'est pas de l'inaction — la différence",text:`Il y a une confusion que beaucoup de gens font.

Confondre la patience avec l'inaction.

La patience c'est travailler tous les jours sans voir les résultats immédiatement.
C'est planter des graines et attendre qu'elles poussent.
Mais continuer à arroser. Tous les jours.

L'inaction c'est attendre que les résultats arrivent sans rien faire.

La patience active — tu travailles, tu construis, tu avances.
L'inaction passive — tu attends le bon moment qui n'existe pas.

Les résultats en entrepreneuriat arrivent en retard.
Six mois, un an, deux ans après que tu aies planté les premières graines.

Mais ils arrivent — si tu continues à planter.

Tout sur StartBusinessWorld.com — lien dans la description.`},
s6_1:{meta:"Short · Samedi S1 · Import/Export",title:"La douane — ce qui se passe quand ta marchandise arrive au port",text:`Ton container arrive au port du Havre.

Voilà exactement ce qui se passe.

Étape 1 — La déclaration en douane.
Ton transitaire soumet une déclaration électronique aux douanes françaises.

Étape 2 — Le calcul des droits.
Les douanes calculent les droits de douane basés sur le code SH du produit et sa valeur en douane.

Étape 3 — Le paiement.
Tu règles les droits de douane et la TVA à l'import.
Si t'es une entreprise assujettie à la TVA, tu récupères la TVA ensuite.

Étape 4 — Le bon à enlever.
Une fois validé, les douanes délivrent le bon à enlever.
C'est l'autorisation de sortir la marchandise du port.

Étape 5 — La livraison.
Un transporteur vient chercher ton container et le livre à ton adresse.

Dans 95% des cas ça prend 24 à 48 heures.

Tout sur StartBusinessWorld.com — lien dans la description.`},
s6_2:{meta:"Short · Samedi S1 · Hong Kong",title:"Ouvrir un compte bancaire à Hong Kong en 2025",text:`Ouvrir un compte bancaire à Hong Kong.

C'est le point qui fait peur à beaucoup d'entrepreneurs.

Bonne nouvelle — c'est plus simple que t'imagines.

Option 1 — Les banques traditionnelles hongkongaises.
HSBC Hong Kong, Hang Seng, Bank of China HK.
Très complètes. Mais elles demandent souvent une présence physique.

Option 2 — Les fintech.
Airwallex, Wise, Currenxie.
Ouverture 100% en ligne.
Comptes multi-devises.
Parfaites pour les entrepreneurs qui gèrent leurs flux de partout.

La combinaison gagnante : une fintech pour les flux quotidiens, plus un compte bancaire traditionnel pour la crédibilité.

Documents généralement demandés.
Certificat de constitution. Preuve d'identité. Preuve d'adresse. Description de l'activité.

s6_3:{meta:"Short · Samedi S1 · E-commerce",title:"Comment trouver un fournisseur — au-delà d'Alibaba",text:`Alibaba c'est pas la seule option pour trouver des fournisseurs.

Et souvent c'est même pas la meilleure.

Voilà d'autres sources que les pros utilisent.

Les salons professionnels.
Canton Fair en Chine — deux fois par an.
Des milliers de fabricants réunis au même endroit.
Tu rencontres les fournisseurs en personne.

Global Sources.
Plus orienté B2B professionnel.
Souvent des fournisseurs de meilleure qualité qu'Alibaba.

Les agents de sourcing.
Tu leur donnes un cahier des charges. Ils trouvent le fournisseur pour toi.

1688.
Le Alibaba chinois — en mandarin.
Les prix sont bien meilleurs.
Mais tu as besoin d'un agent ou de parler mandarin.

La règle absolue.
Commande un échantillon avant de passer une vraie commande.
Toujours.

Tout sur StartBusinessWorld.com — lien dans la description.`},
s6_4:{meta:"Short · Samedi S1 · Mindset",title:"Ton réseau vaut plus que ton diplôme",text:`Dans la vie réelle, ton réseau vaut infiniment plus que ton diplôme.

Ton diplôme t'ouvre des portes dans des systèmes établis.
Ton réseau t'ouvre des portes partout ailleurs.

La réalité de l'entrepreneuriat.

La plupart des opportunités ne sont jamais affichées publiquement.
Les meilleurs fournisseurs, les meilleurs partenaires, les meilleures opportunités.
Tout ça se passe entre personnes qui se font confiance.

Et la confiance ça se construit par le réseau.

Comment construire un réseau solide ?

Sois généreux avant de demander quoi que ce soit.
Partage de la valeur. Aide les autres. Connecte les gens entre eux.

Montre ce que tu construis.
Les réseaux sociaux sont l'outil le plus puissant pour ça.

Investis dans ton réseau maintenant.
Même si t'as pas encore besoin de lui.

Tout sur StartBusinessWorld.com — lien dans la description.`},
s6_5:{meta:"Short · Samedi S1 · Fiscalité",title:"TVA à l'import — évite les mauvaises surprises",text:`Tu importes des marchandises depuis l'étranger.
À l'arrivée en France, tu vas payer de la TVA.

Depuis le 1er juillet 2021, la franchise de TVA à l'import a été supprimée en Europe.
Quel que soit le montant, la TVA est due.
Même pour 1 euro.

Le taux standard en France c'est 20%.

Sur quoi est calculée la TVA ?
Sur la valeur en douane — prix de la marchandise plus frais de transport — à laquelle on ajoute les droits de douane.

La bonne nouvelle si tu es une société assujettie à la TVA.
Tu payes la TVA à l'import, mais tu la récupères sur ta déclaration.
C'est une avance de trésorerie, pas un coût définitif.

En revanche si tu es en micro-entreprise, tu ne récupères pas la TVA.
C'est un coût sec.

Tout sur StartBusinessWorld.com — lien dans la description.`},
s7_1:{meta:"Short · Dimanche S1 · Import/Export",title:"Le Bill of Lading — le document le plus important de ton import",text:`Il y a un document que tu ne dois jamais perdre quand tu importes par voie maritime.

Le Bill of Lading.

C'est le titre de propriété de ta marchandise en transit.

Celui qui détient le Bill of Lading est légalement le propriétaire de la marchandise.
Sans lui, tu ne peux pas récupérer ton container au port.

Il contient quoi ?

Les informations sur l'expéditeur et le destinataire.
La description de la marchandise.
Le port de départ et le port d'arrivée.
Le nom du bateau et le numéro de voyage.

Il existe trois formes.

Original — physique, transmissible comme un titre de propriété.
Telex release — remise sans document physique. Plus rapide.
Sea Waybill — non négociable, directement au nom du destinataire.

Dans la grande majorité des imports aujourd'hui, c'est le telex release qui est utilisé.

Tout sur StartBusinessWorld.com — lien dans la description.`},
s7_2:{meta:"Short · Dimanche S1 · Immobilier",title:"Investir dans l'immobilier à l'étranger — par où commencer",text:`Investir dans l'immobilier à l'étranger.

Beaucoup en rêvent. Peu savent par où commencer.

Voilà la méthode simple.

Étape 1 — Choisir le marché.
Commence par un pays que tu connais ou que tu fréquentes.
Un marché avec un cadre juridique clair pour les étrangers.

Étape 2 — Comprendre la fiscalité locale.
Certains pays ont une fiscalité très attractive pour les investisseurs étrangers.

Étape 3 — Identifier le type d'investissement.
Résidentiel locatif court terme.
Résidentiel locatif long terme.
Commercial. Terrain.

Étape 4 — Trouver les bons partenaires locaux.
Avocat. Agent immobilier spécialisé. Gestionnaire de biens.

Les marchés qui attirent beaucoup d'investisseurs francophones en ce moment.
Dubaï, Portugal, Maurice, Maroc.

Je t'explique chaque marché sur StartBusinessWorld.com — lien dans la description.`},
s7_3:{meta:"Short · Dimanche S1 · Fiscalité",title:"Les charges en SASU — ce que tu vas vraiment payer",text:`Tu veux créer une SASU et tu veux savoir ce que ça va vraiment te coûter.

Si tu te verses un salaire.
Les cotisations patronales représentent environ 45% du salaire brut.
Pour un salaire net de 2 000 euros, ta société débourse environ 3 800 euros.

Si tu ne te verses pas de salaire.
Zéro cotisations sociales.
Si tu réinvestis tous tes bénéfices, tu ne payes rien socialement.

Les charges fixes de la société.
Comptable — entre 100 et 300 euros par mois.
Assurance RC Pro — entre 30 et 150 euros par mois.

L'impôt sur les sociétés.
15% sur les premiers 42 500 euros de bénéfices.
25% au-delà.

La SASU c'est une structure flexible si tu sais comment l'utiliser.

Je t'explique tout sur StartBusinessWorld.com — lien dans la description.`},
s7_4:{meta:"Short · Dimanche S1 · Mindset",title:"La discipline — ce qui sépare ceux qui réussissent des autres",text:`La motivation c'est surfaite.

Tout le monde est motivé au début.
Le premier jour. La première semaine.

Puis la motivation disparaît.

C'est là que la discipline prend le relais.

La discipline c'est faire ce que tu dois faire même quand t'as pas envie.
Même quand c'est difficile.
Même quand les résultats ne sont pas encore là.

Les gens qui réussissent ne sont pas plus motivés que les autres.
Ils sont plus disciplinés.

Ils ont des routines. Des systèmes. Des habitudes non négociables.

Ils travaillent le lundi matin même s'ils préféreraient rester au lit.
Ils continuent à produire du contenu même si personne ne les regarde encore.

La motivation te fait démarrer.
La discipline te fait arriver.

Construis ta discipline avant d'attendre ta motivation.

Tout sur StartBusinessWorld.com — lien dans la description.`},
s7_5:{meta:"Short · Dimanche S1 · Hong Kong",title:"Offshore ça veut pas dire illégal — les idées reçues",text:`Le mot "offshore" fait peur.

Les gens entendent offshore et pensent immédiatement à de l'évasion fiscale.

La réalité c'est beaucoup plus simple.

Offshore ça veut juste dire "en dehors du pays d'imposition principal."

Une société est considérée offshore quand elle réalise son activité en dehors du pays où elle est enregistrée.

C'est légal.
Des millions de sociétés dans le monde fonctionnent de cette façon.

Ce qui est illégal c'est la dissimulation.
Cacher des revenus au fisc.
Ne pas déclarer une société étrangère que tu contrôles.

Mais créer une société à Hong Kong, la déclarer aux autorités fiscales, et bénéficier d'une fiscalité favorable —

C'est parfaitement légal.

Et c'est ce que font des milliers d'entrepreneurs dans le monde.

Je t'explique comment faire ça correctement sur StartBusinessWorld.com — lien dans la description.`}

// RENDER
// ══════════════════════════════════════════════
function initApp(){
  updateMonthLabel();
  renderWeek(0);
}

function updateMonthLabel(){
  document.getElementById('month-label').textContent = MONTHS_FR[currentMonth]+' '+currentYear;
}

function changeMonth(d){
  currentMonth+=d;
  if(currentMonth<0){currentMonth=11;currentYear--;}
  if(currentMonth>11){currentMonth=0;currentYear++;}
  updateMonthLabel();
}

function showWeek(idx){
  currentWeek=idx;
  document.querySelectorAll('.wtab').forEach((t,i)=>t.classList.toggle('active',i===idx));
  renderWeek(idx);
}

function renderWeek(idx){
  const w = WEEK_DATA[idx]||WEEK_DATA[0];
  let html='';
  if(w.videos&&w.videos.length){
    w.videos.forEach(v=>{
      html+=`<div class="vbanner" onclick="openScript('${v.key}')">
        <div class="vb-left"><div class="vb-icon">🎥</div>
        <div><div class="vb-type">Vidéo Longue</div><div class="vb-title">${v.title}</div></div></div>
        <div class="vb-right"><div class="vb-dur">${v.dur}</div><button class="open-btn">Ouvrir script</button></div>
      </div>`;
    });
  }
  w.days.forEach(day=>{
    html+=`<div class="day-block"><div class="day-hdr">
      <div class="day-name">${day.name}</div>
      <div class="day-count">${day.shorts.length} shorts · ${day.pubs.length} publications</div>
    </div><div class="shorts-grid">`;
    day.shorts.forEach(s=>{
      const sc = SCRIPTS[s.key];
      html+=`<div class="ccard short" onclick="openScript('${s.key}')">
        <div class="cc-type s">Short</div>
        <div class="pill ${s.pill}">${s.label}</div>
        <div class="cc-title">${sc?sc.title:s.title}</div>
      </div>`;
    });
    html+=`</div><div class="pubs-grid">`;
    day.pubs.forEach((p,i)=>{
      html+=`<div class="ccard pub" onclick="showPubPlaceholder('${day.name}',${i})">
        <div class="cc-type p">Publication</div>
        <div class="pill ${p.pill}">${p.label}</div>
        <div class="cc-title">${p.title}</div>
        <div class="cc-fmt">${p.fmt||''}</div>
      </div>`;
    });
    html+=`</div></div>`;
  });
  document.getElementById('week-content').innerHTML=html;
  document.getElementById('week-content').scrollTop=0;
}

function showPubPlaceholder(day,idx){
  // Publications don't have scripts yet — show placeholder
  document.getElementById('ph-meta').textContent='Publication · '+day;
  document.getElementById('ph-title').textContent='Script à venir pour cette publication';
  document.getElementById('script-render').textContent='Ce script publication sera ajouté lors de la prochaine mise à jour du planning.';
  document.getElementById('btn-cp').textContent='Copier';
  document.getElementById('btn-cp').classList.remove('ok');
  document.getElementById('overlay').classList.add('on');
}

// OVERLAY
// ══════════════════════════════════════════════
function openScript(key){
  const s=SCRIPTS[key];
  if(!s)return;
  currentScriptKey=key;
  document.getElementById('ph-meta').textContent=s.meta||'';
  document.getElementById('ph-title').textContent=s.title||'';
  document.getElementById('script-render').textContent=s.text||'';
  document.getElementById('btn-cp').textContent='Copier';
  document.getElementById('btn-cp').classList.remove('ok');
  document.getElementById('overlay').classList.add('on');
  document.getElementById('popup').querySelector('.popup-body').scrollTop=0;
}
function closeOverlay(){document.getElementById('overlay').classList.remove('on');}
function closeOverlayBg(e){if(e.target===document.getElementById('overlay'))closeOverlay();}
function copyScript(){
  const s=SCRIPTS[currentScriptKey];
  if(!s)return;
  navigator.clipboard.writeText(s.text||'').then(()=>{
    const b=document.getElementById('btn-cp');
    b.textContent='✓ Copié !';b.classList.add('ok');
    setTimeout(()=>{b.textContent='Copier';b.classList.remove('ok');},2000);
  });
}

// TELEPROMPTER
// ══════════════════════════════════════════════
let tpWords = [];
let tpCurrentIdx = 0;
let tpFontSize = 36;
let tpAutoPlaying = false;
let tpAutoInterval = null;
let tpSpeed = 3;
let tpVoiceActive = false;
let recognition = null;

function openTP(){
  const s=SCRIPTS[currentScriptKey];
  if(!s)return;
  document.getElementById('tp-lesson-name').textContent=s.title||'';
  buildWordDisplay(s.text||'');
  document.getElementById('tp-text').style.display='none'; // hide old
  document.getElementById('teleprompter').classList.add('on');
  document.getElementById('tp-scroll').scrollTop=0;
  tpCurrentIdx=0;
  tpAutoPlaying=false;
  tpVoiceActive=false;
  updateScrollBtn();
  updateVoiceBtn();
  document.getElementById('tp-voice-status').classList.remove('on');
}

function buildWordDisplay(text){
  // Split into tokens preserving newlines
  const container = document.getElementById('tp-words');
  container.innerHTML='';
  tpWords=[];

  const lines = text.split('\n');
  lines.forEach((line,li)=>{
    const words = line.split(/\s+/).filter(w=>w.length>0);
    words.forEach((word,wi)=>{
      const span = document.createElement('span');
      span.className='tp-word upcoming';
      span.textContent=word+' ';
      span.dataset.idx=tpWords.length;
      span.onclick=()=>jumpToWord(tpWords.length-1); // will be set correctly below
      container.appendChild(span);
      tpWords.push({el:span,word:word.toLowerCase().replace(/[^a-zA-ZàâäéèêëîïôùûüçœæÀÂÄÉÈÊËÎÏÔÙÛÜÇŒÆ0-9]/g,'')});
    });
    // Add line break
    if(li<lines.length-1){
      const br=document.createElement('br');
      container.appendChild(br);
    }
  });

  // Fix onclick after all words are added
  tpWords.forEach((w,i)=>{
    w.el.onclick=()=>jumpToWord(i);
  });

  document.getElementById('tp-words').style.fontSize=tpFontSize+'px';
  highlightWord(0);
}

function highlightWord(idx){
  tpCurrentIdx=idx;
  tpWords.forEach((w,i)=>{
    w.el.classList.remove('spoken','current','upcoming');
    if(i<idx) w.el.classList.add('spoken');
    else if(i===idx) w.el.classList.add('current');
    else w.el.classList.add('upcoming');
  });
  scrollToCurrentWord();
}

function scrollToCurrentWord(){
  if(!tpWords[tpCurrentIdx])return;
  const el=tpWords[tpCurrentIdx].el;
  const scroll=document.getElementById('tp-scroll');
  const targetY = el.offsetTop - (window.innerHeight*0.28);
  scroll.scrollTo({top:Math.max(0,targetY),behavior:'smooth'});
}

function jumpToWord(idx){
  stopAutoScroll();
  stopVoice();
  highlightWord(idx);
}

// ── AUTO SCROLL ──
function toggleAutoScroll(){
  if(tpAutoPlaying) stopAutoScroll(); else startAutoScroll();
  updateScrollBtn();
}

function startAutoScroll(){
  stopAutoScroll();
  tpAutoPlaying=true;
  tpAutoInterval=setInterval(()=>{
    if(tpCurrentIdx<tpWords.length-1){
      highlightWord(tpCurrentIdx+1);
    } else {
      stopAutoScroll(); updateScrollBtn();
    }
  }, Math.max(100, 1100-(tpSpeed*90)));
}

function stopAutoScroll(){
  clearInterval(tpAutoInterval); tpAutoInterval=null;
  tpAutoPlaying=false;
}

function updateScrollBtn(){
  const b=document.getElementById('tp-scroll-btn');
  b.textContent=tpAutoPlaying?'⏸ Pause':'▶ Défilement auto';
  b.classList.toggle('playing',tpAutoPlaying);
}

function updateSpeed(){
  tpSpeed=parseInt(document.getElementById('tp-speed').value);
  document.getElementById('tp-speed-val').textContent=tpSpeed;
  if(tpAutoPlaying){stopAutoScroll();startAutoScroll();}
}

// ── VOICE ──
function toggleVoice(){
  if(tpVoiceActive) stopVoice(); else startVoice();
}

function startVoice(){
  const SR = window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){
    alert('La reconnaissance vocale nécessite Chrome ou Safari. Utilise le défilement automatique à la place.');
    return;
  }

  stopAutoScroll();
  recognition=new SR();
  recognition.lang='fr-FR';
  recognition.continuous=true;
  recognition.interimResults=true;
  recognition.maxAlternatives=3;

  recognition.onstart=()=>{
    tpVoiceActive=true;
    updateVoiceBtn();
    document.getElementById('tp-voice-status').classList.add('on');
  };

  recognition.onresult=(event)=>{
    for(let i=event.resultIndex;i<event.results.length;i++){
      // Use all alternatives
      for(let a=0;a<event.results[i].length;a++){
        const transcript=event.results[i][a].transcript.toLowerCase()
          .replace(/[^a-zA-ZàâäéèêëîïôùûüçœæÀÂÄÉÈÊËÎÏÔÙÛÜÇŒÆ0-9\s]/g,'');
        const spoken=transcript.trim().split(/\s+/).filter(w=>w.length>1);

        for(const sw of spoken){
          const clean=sw.replace(/[^a-zA-ZàâäéèêëîïôùûüçœæÀÂÄÉÈÊËÎÏÔÙÛÜÇŒÆ0-9]/g,'');
          if(clean.length<2)continue;

          // Search forward in script from current position
          const searchRange=Math.min(tpCurrentIdx+20,tpWords.length);
          for(let j=tpCurrentIdx;j<searchRange;j++){
            const sw2=tpWords[j].word;
            // Exact match or prefix match (≥4 chars)
            if(sw2===clean || (clean.length>=4&&sw2.startsWith(clean.substring(0,4))) || (sw2.length>=4&&clean.startsWith(sw2.substring(0,4)))){
              if(j>tpCurrentIdx){
                highlightWord(j);
              }
              break;
            }
          }
        }
      }
    }
  };

  recognition.onerror=(e)=>{
    if(e.error!=='no-speech'&&e.error!=='aborted'){
      stopVoice();
    }
  };

  recognition.onend=()=>{
    if(tpVoiceActive){
      // Restart if still active
      try{ recognition.start(); }catch(e){}
    }
  };

  try{ recognition.start(); }
  catch(e){ tpVoiceActive=false; updateVoiceBtn(); }
}

function stopVoice(){
  tpVoiceActive=false;
  if(recognition){ try{recognition.stop();}catch(e){} recognition=null; }
  updateVoiceBtn();
  document.getElementById('tp-voice-status').classList.remove('on');
}

function updateVoiceBtn(){
  const b=document.getElementById('tp-voice-btn');
  b.textContent=tpVoiceActive?'🎤 Arrêter écoute':'🎤 Défilement vocal';
  b.classList.toggle('listening',tpVoiceActive);
}

function resetTP(){
  stopAutoScroll();
  stopVoice();
  highlightWord(0);
  document.getElementById('tp-scroll').scrollTop=0;
}

function closeTP(){
  stopAutoScroll();
  stopVoice();
  document.getElementById('teleprompter').classList.remove('on');
}

function changeSize(d){
  tpFontSize=Math.max(18,Math.min(72,tpFontSize+d));
  document.getElementById('tp-words').style.fontSize=tpFontSize+'px';
}

// ── KEYBOARD ──
document.addEventListener('keydown',e=>{
  if(document.getElementById('teleprompter').classList.contains('on')){
    if(e.code==='Space'){e.preventDefault();toggleAutoScroll();}
    if(e.key==='ArrowRight'||e.key==='ArrowDown'){e.preventDefault();if(tpCurrentIdx<tpWords.length-1)highlightWord(tpCurrentIdx+1);}
    if(e.key==='ArrowLeft'||e.key==='ArrowUp'){e.preventDefault();if(tpCurrentIdx>0)highlightWord(tpCurrentIdx-1);}
    if(e.key==='Escape'){closeTP();}
  } else {
    if(e.key==='Escape')closeOverlay();
  }
});

// INIT

if(localStorage.getItem('sbw_auth')==='1') initApp();
